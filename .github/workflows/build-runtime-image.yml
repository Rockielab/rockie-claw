name: build-runtime-image

# Builds and pushes the per-tenant multitenant runtime image to GHCR.
# Triggered on changes to anything that affects the image, and manually.
#
# Two jobs:
#   1. build         — buildx + push to ghcr.io/saml212/rockielab-runtime-multitenant:{sha,latest}
#   2. dispatch-deploy — optional cross-repo trigger of deploy-hetzner.yml
#                        (skipped silently if PLATFORM_CONTEXT_DISPATCH_TOKEN
#                        isn't set on this repo).
#
# Dockerfile.multitenant uses `COPY --from=skills` which expects a
# named build-context. We vendor saml212/platform-skills (a private
# sibling repo) into the runner before building.
#
# Required CI secrets (set in saml212/platform-runtime Actions secrets):
#   - PLATFORM_SKILLS_READ_TOKEN  (fine-grained PAT with Contents:Read on
#     saml212/platform-skills only. Required because platform-skills is
#     private and the default GITHUB_TOKEN is scoped to this repo only.)
#
# GHCR push auth uses the workflow's auto-minted GITHUB_TOKEN (the
# job-level `permissions: packages: write` block grants the necessary
# scope). No long-lived PAT to rotate.
#
# Optional CI secrets:
#   - PLATFORM_CONTEXT_DISPATCH_TOKEN  (PAT with `actions:write` on
#     saml212/platform-context). Lets a successful build automatically
#     trigger the Hetzner deploy. Skip if you'd rather click the deploy
#     manually after a build.

on:
  push:
    branches: [main]
    # Only rebuild when paths that affect the runtime image actually change.
    # Skipping image-irrelevant paths (root *.md governance, designs/, plans/,
    # test/, .github/ non-this-workflow) cuts ~30 min of useless build time
    # per unrelated push. Anything `COPY . .` in Dockerfile.multitenant's
    # build stage walks — or that downstream `pnpm build:docker`/`ui:build`/
    # `qa:lab:build` compiles into dist/ — must be enumerated here. See
    # rockie-workspace#914 for the audit that produced this list.
    paths:
      - "Dockerfile.multitenant"
      - ".dockerignore"
      - "overlay/multitenant/**"
      - "apps/broker/**"
      - "apps/shared/**"
      - "src/**"
      - "ui/**"
      - "qa/**"
      - "packages/**"
      - "extensions/**"
      - "scripts/**"
      - "patches/**"
      - "skills/**"
      - "config/**"
      - "docs/**"
      - "vendor/a2ui/**"
      - "openclaw.mjs"
      - "tsconfig*.json"
      - "pnpm-workspace.yaml"
      - ".npmrc"
      - "package.json"
      - "bun.lockb"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-runtime-image.yml"
  workflow_dispatch: {}
  repository_dispatch:
    # Fired by saml212/platform-skills when its `main` updates, so the
    # baked-in skills overlay gets a fresh build. The dispatcher
    # workflow lives on platform-skills (TODO if it doesn't exist yet).
    types: [skills-updated]

concurrency:
  group: build-runtime-image
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/saml212/rockielab-runtime-multitenant
      # Map the secret to env so we can `if:` on it (secrets context is
      # not available in step-level if expressions; env is).
      SKILLS_READ_TOKEN: ${{ secrets.PLATFORM_SKILLS_READ_TOKEN }}
    steps:
      - name: Preflight — require PLATFORM_SKILLS_READ_TOKEN
        if: env.SKILLS_READ_TOKEN == ''
        run: |
          echo "::error::PLATFORM_SKILLS_READ_TOKEN secret is not set on this repo."
          echo "Generate a fine-grained PAT with Contents:Read on saml212/platform-skills,"
          echo "then: gh secret set PLATFORM_SKILLS_READ_TOKEN --repo saml212/platform-runtime --body '<pat>'"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout platform-skills (vendored at build time)
        uses: actions/checkout@v4
        with:
          repository: saml212/platform-skills
          path: vendor/platform-skills
          token: ${{ secrets.PLATFORM_SKILLS_READ_TOKEN }}
          fetch-depth: 1

      - name: Free up runner disk
        run: |
          # GH default runners come with caches/SDKs we don't need for this build.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Use the workflow's built-in GITHUB_TOKEN (with packages:write via
        # the job-level `permissions:` block above) instead of a PAT. PATs
        # need manual rotation when they expire / get revoked — GITHUB_TOKEN
        # is minted per-run and auto-scoped to the repo's package namespace.
        # This unblocked the 2026-05-11 BYOK runtime-image push when the
        # long-lived GHCR_TOKEN PAT started 401-ing.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.multitenant
          # Dockerfile.multitenant has `COPY --from=skills .` which
          # resolves via this named build-context, fed from the
          # vendored checkout above.
          build-contexts: |
            skills=vendor/platform-skills
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Record runtime image platform proof
        env:
          RUNTIME_IMAGE_REF: ${{ env.IMAGE }}:${{ github.sha }}
          TARGET_PLATFORM: linux/amd64
        run: |
          set -euo pipefail

          proof_dir=".artifacts/runtime-image-platform"
          proof_file="$proof_dir/broker-platform-proof.txt"
          mkdir -p "$proof_dir"

          container_id=""
          cleanup() {
            if [ -n "$container_id" ]; then
              docker rm -f "$container_id" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          {
            echo "runtime_image=$RUNTIME_IMAGE_REF"
            echo "runner_os=${RUNNER_OS:-unknown}"
            echo "runner_arch=${RUNNER_ARCH:-unknown}"
            echo "target_platform=$TARGET_PLATFORM"
            echo "docker_server=$(docker version --format '{{.Server.Version}}')"
            echo "buildx_version=$(docker buildx version)"
            echo ""
            echo "## Manifest"
            docker buildx imagetools inspect "$RUNTIME_IMAGE_REF"
          } > "$proof_file"

          container_id="$(docker create --platform "$TARGET_PLATFORM" "$RUNTIME_IMAGE_REF")"
          docker cp "$container_id:/usr/local/bin/broker" "$proof_dir/broker"

          {
            echo ""
            echo "## Broker binary"
            file "$proof_dir/broker"
            shasum -a 256 "$proof_dir/broker"
          } >> "$proof_file"

          if ! file "$proof_dir/broker" | grep -Eq 'ELF 64-bit.*(x86-64|x86_64)'; then
            echo "::error::broker binary is not linux/amd64"
            cat "$proof_file"
            exit 1
          fi

          cat "$proof_file"

          {
            echo "## Runtime image platform proof"
            echo ""
            echo "- runner: \`${RUNNER_OS:-unknown}/${RUNNER_ARCH:-unknown}\`"
            echo "- target platform: \`$TARGET_PLATFORM\`"
            echo "- runtime image: \`$RUNTIME_IMAGE_REF\`"
            echo ""
            echo "### Broker binary"
            echo '```'
            file "$proof_dir/broker"
            shasum -a 256 "$proof_dir/broker"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runtime image platform proof
        uses: actions/upload-artifact@v4
        with:
          name: runtime-image-platform-proof
          path: .artifacts/runtime-image-platform/broker-platform-proof.txt

      - name: Summary
        run: |
          echo "## Pushed runtime image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Set \`ROCKIELAB_RUNTIME_IMAGE=${{ env.IMAGE }}:${{ github.sha }}\` in platform-context's Hetzner .env to roll forward." >> $GITHUB_STEP_SUMMARY

  dispatch-deploy:
    needs: build
    runs-on: [self-hosted, macOS, ARM64, rockie]
    timeout-minutes: 5
    # Map the secret to a job-level env var. We can't reference `secrets.*`
    # in `if:` expressions (job- or step-level), but we CAN reference
    # `env.*`. So we read the secret into env at job startup, then gate
    # the step on env. If the secret is unset, env is empty and the
    # step skips silently.
    env:
      DISPATCH_TOKEN: ${{ secrets.PLATFORM_CONTEXT_DISPATCH_TOKEN }}
    steps:
      - name: Trigger platform-context deploy-hetzner
        if: env.DISPATCH_TOKEN != ''
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/saml212/platform-context/actions/workflows/deploy-hetzner.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Note when skipped
        if: env.DISPATCH_TOKEN == ''
        run: |
          echo "## Cross-repo deploy NOT triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "PLATFORM_CONTEXT_DISPATCH_TOKEN is not set on this repo, so the Hetzner deploy was not auto-triggered. Click 'Run workflow' manually on saml212/platform-context's deploy-hetzner.yml when ready." >> $GITHUB_STEP_SUMMARY

  rollout-tenants:
    # Step 7 of #816: after the runtime image is pushed to GHCR, roll
    # every tenant's Fly machine forward to the new SHA so the freshly-
    # baked-in skills/hooks/overlay are live for users on the next chat
    # turn — without an operator needing to click anything.
    #
    # Calls POST /api/admin/tenants/rollout (shipped 2026-05-29) which
    # iterates Tenant.get_all(), caps concurrency at 10 Fly Machines
    # API calls in flight, and reports per-tenant outcomes (updated /
    # skipped / failed). Idempotent: re-running the same SHA on a
    # tenant that's already on it is a no-op.
    #
    # Both auth gates required:
    #   X-Admin-Token         = ROCKIELAB_ADMIN_TOKEN env on api host
    #   Authorization: Bearer = OPEN_NOTEBOOK_PASSWORD env on api host
    # If either secret is unset on this repo OR the api host, the call
    # 401s and the rollout is skipped with a clear summary line.
    needs: build
    runs-on: [self-hosted, macOS, ARM64, rockie]
    timeout-minutes: 30
    env:
      API_URL: ${{ secrets.ROCKIELAB_API_URL }}
      ADMIN_TOKEN: ${{ secrets.ROCKIELAB_ADMIN_TOKEN }}
      API_PASSWORD: ${{ secrets.ROCKIELAB_API_PASSWORD }}
      IMAGE_TAG: ghcr.io/saml212/rockielab-runtime-multitenant:${{ github.sha }}
      ROLLOUT_ARTIFACT_DIR: .artifacts/runtime-rollout
      ROLLOUT_MAX_ATTEMPTS: "5"
      ROLLOUT_CURL_MAX_TIME: "180"
    steps:
      - name: Preflight — required secrets present
        id: preflight
        run: |
          mkdir -p "$ROLLOUT_ARTIFACT_DIR"
          missing=""
          [ -z "$API_URL" ] && missing="$missing ROCKIELAB_API_URL"
          [ -z "$ADMIN_TOKEN" ] && missing="$missing ROCKIELAB_ADMIN_TOKEN"
          [ -z "$API_PASSWORD" ] && missing="$missing ROCKIELAB_API_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::warning::Skipping cross-tenant rollout. Missing secrets on saml212/platform-runtime:$missing"
            echo "skipped=true" >> $GITHUB_OUTPUT
            {
              echo "## Cross-tenant rollout SKIPPED"
              echo ""
              echo "Required secrets missing:$missing"
              echo ""
              echo "Set them with \`gh secret set <NAME> --repo saml212/platform-runtime --body '<value>'\`."
              echo ""
              echo "ROCKIELAB_API_URL: full https url of the api host (e.g. \`https://api.rockielab.com\`)"
              echo "ROCKIELAB_ADMIN_TOKEN: must match the api host's env"
              echo "ROCKIELAB_API_PASSWORD: must match OPEN_NOTEBOOK_PASSWORD on the api host"
            } >> $GITHUB_STEP_SUMMARY
            {
              echo "# Cross-tenant rollout skipped"
              echo ""
              echo "Image: \`$IMAGE_TAG\`"
              echo "Image SHA: \`$GITHUB_SHA\`"
              echo ""
              echo "Missing secrets:$missing"
              echo ""
              echo "Final result: skipped"
            } > "$ROLLOUT_ARTIFACT_DIR/rollout-summary.md"
            jq -n \
              --arg image "$IMAGE_TAG" \
              --arg result "skipped" \
              --arg missing "$missing" \
              '{image: $image, final_result: $result, missing_secrets: ($missing | split(" ") | map(select(. != "")))}' \
              > "$ROLLOUT_ARTIFACT_DIR/rollout-summary.json"
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Roll every tenant to the new image SHA
        if: steps.preflight.outputs.skipped == 'false'
        run: |
          # Strip any trailing slash on API_URL.
          mkdir -p "$ROLLOUT_ARTIFACT_DIR"
          base="${API_URL%/}"
          rollout_url="$base/api/admin/tenants/rollout?image=$(printf '%s' "$IMAGE_TAG" | jq -sRr @uri)"
          summary_md="$ROLLOUT_ARTIFACT_DIR/rollout-summary.md"
          summary_json="$ROLLOUT_ARTIFACT_DIR/rollout-summary.json"
          attempts_jsonl="$ROLLOUT_ARTIFACT_DIR/attempts.jsonl"
          final_response_json="$ROLLOUT_ARTIFACT_DIR/final-response.json"
          final_response_body="$ROLLOUT_ARTIFACT_DIR/final-response.txt"
          : > "$attempts_jsonl"

          echo "POST $base/api/admin/tenants/rollout?image=$IMAGE_TAG"

          is_transient_rollout_error() {
            case "$1" in
              000|520|521|522|523|524) return 0 ;;
              *) return 1 ;;
            esac
          }

          response_codes=()
          retry_count=0
          attempt=1
          max_attempts="$ROLLOUT_MAX_ATTEMPTS"
          backoff_seconds=5
          final_result="failed"
          final_code="000"
          curl_exit=0
          final_response_file=""

          while [ "$attempt" -le "$max_attempts" ]; do
            response_file=$(mktemp)
            set +e
            code=$(curl -sS -o "$response_file" -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time "$ROLLOUT_CURL_MAX_TIME" \
              -X POST \
              -H "X-Admin-Token: $ADMIN_TOKEN" \
              -H "Authorization: Bearer $API_PASSWORD" \
              -H "Accept: application/json" \
              "$rollout_url")
            curl_exit=$?
            set -e

            if [ "$curl_exit" -ne 0 ] || [ -z "$code" ]; then
              code="000"
            fi
            response_codes+=("$code")
            final_code="$code"
            final_response_file="$response_file"

            retryable=false
            if is_transient_rollout_error "$code"; then
              retryable=true
            fi

            jq -n \
              --arg attempt "$attempt" \
              --arg code "$code" \
              --arg curl_exit "$curl_exit" \
              --arg retryable "$retryable" \
              --rawfile body "$response_file" \
              '{
                attempt: ($attempt | tonumber),
                response_code: $code,
                curl_exit: ($curl_exit | tonumber),
                retryable: ($retryable == "true"),
                response_body: $body
              }' >> "$attempts_jsonl"

            echo "attempt $attempt response code: $code curl exit: $curl_exit"
            echo "--- response body ---"
            cat "$response_file" | jq . 2>/dev/null || cat "$response_file"
            echo "--- end body ---"

            if [ "$code" = "200" ]; then
              final_result="succeeded"
              break
            fi

            if [ "$retryable" != "true" ]; then
              echo "::error::rollout endpoint returned non-retryable HTTP $code"
              final_result="failed-non-retryable"
              break
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::rollout endpoint still returned transient HTTP $code after $attempt attempt(s)"
              final_result="failed-after-retries"
              break
            fi

            retry_count=$((retry_count + 1))
            echo "::warning::Transient rollout error HTTP $code on attempt $attempt; retrying in ${backoff_seconds}s."
            sleep "$backoff_seconds"
            backoff_seconds=$((backoff_seconds * 2))
            if [ "$backoff_seconds" -gt 60 ]; then
              backoff_seconds=60
            fi
            attempt=$((attempt + 1))
          done

          cp "$final_response_file" "$final_response_body"
          if jq . "$final_response_file" >/dev/null 2>&1; then
            jq . "$final_response_file" > "$final_response_json"
          fi

          codes_csv=$(IFS=,; echo "${response_codes[*]}")
          updated=0
          skipped=0
          failed=0
          total=0
          if [ "$final_result" = "succeeded" ]; then
            updated=$(jq -r '.summary.updated // 0' "$final_response_file")
            skipped=$(jq -r '.summary.skipped // 0' "$final_response_file")
            failed=$(jq -r '.summary.failed // 0' "$final_response_file")
            total=$(jq -r '.summary.total // 0' "$final_response_file")
          fi

          jq -n \
            --arg image "$IMAGE_TAG" \
            --arg final_result "$final_result" \
            --arg final_code "$final_code" \
            --arg response_codes "$codes_csv" \
            --arg retry_count "$retry_count" \
            --arg updated "$updated" \
            --arg skipped "$skipped" \
            --arg failed "$failed" \
            --arg total "$total" \
            --slurpfile attempts "$attempts_jsonl" \
            '{
              image: $image,
              image_sha: ($image | split(":") | last),
              response_codes: ($response_codes | split(",") | map(select(. != ""))),
              retry_count: ($retry_count | tonumber),
              final_result: $final_result,
              final_response_code: $final_code,
              buckets: {
                updated: ($updated | tonumber),
                skipped: ($skipped | tonumber),
                failed: ($failed | tonumber),
                total: ($total | tonumber)
              },
              attempts: $attempts
            }' > "$summary_json"

          {
            echo "## Cross-tenant rollout"
            echo ""
            echo "Image: \`$IMAGE_TAG\`"
            echo "Image SHA: \`$GITHUB_SHA\`"
            echo ""
            echo "- final result: $final_result"
            echo "- final response code: $final_code"
            echo "- response codes: $codes_csv"
            echo "- retries: $retry_count"
            echo ""
            echo "- updated: $updated"
            echo "- skipped (already on target): $skipped"
            echo "- failed: $failed"
            echo "- total tenants seen: $total"
            if [ "$final_result" = "succeeded" ] && [ "$failed" -gt "0" ]; then
              echo ""
              echo "### Failures"
              echo ""
              jq -r '.failed[]' "$final_response_file" | while read tid; do
                err=$(jq -r ".error_details[\"$tid\"]" "$final_response_file")
                echo "- \`$tid\`: $err"
              done
            fi
            if [ "$final_result" != "succeeded" ]; then
              echo ""
              echo "### Final response body"
              echo ""
              echo '```text'
              cat "$final_response_file"
              echo '```'
              echo ""
              echo "### Manual single-tenant recovery"
              echo ""
              echo '```bash'
              echo 'curl -sS -X POST \'
              echo '  -H "X-Admin-Token: $ROCKIELAB_ADMIN_TOKEN" \'
              echo '  -H "Authorization: Bearer $ROCKIELAB_API_PASSWORD" \'
              echo '  -H "Accept: application/json" \'
              echo "  \"${base}/api/tenants/<tenant-id>/image\" \\"
              echo "  -d '{\"image\":\"$IMAGE_TAG\"}'"
              echo '```'
            fi
          } | tee "$summary_md" >> $GITHUB_STEP_SUMMARY

          if [ "$final_result" != "succeeded" ]; then
            echo "::error::Cross-tenant rollout did not succeed; see runtime-rollout-summary artifact."
            exit 1
          fi

          if [ "$(jq -r '.summary.failed // 0' "$final_response_file")" -gt "0" ]; then
            echo "::warning::Some tenants failed to roll forward — see summary."
          fi

      - name: Upload rollout summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-rollout-summary-${{ github.sha }}
          path: ${{ env.ROLLOUT_ARTIFACT_DIR }}
          if-no-files-found: ignore
